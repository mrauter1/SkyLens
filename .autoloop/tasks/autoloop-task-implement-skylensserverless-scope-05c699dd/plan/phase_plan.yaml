phases:
  - phase_id: compact-deep-star-render-retune
    title: Compact deep-star canvas retune
    objective: Implement diameter-aware compact star rendering with a radial-gradient halo in SkyLensServerless while preserving optics and runtime semantics.
    status: planned
    in_scope:
      - SkyLensServerless/components/viewer/scope-star-canvas.tsx
      - SkyLensServerless/tests/unit/scope-star-canvas.test.tsx
      - SkyLensServerless/tests/unit/viewer-shell-scope-runtime.test.tsx
    out_of_scope:
      - SkyLensServerless/lib/viewer/scope-optics.ts algorithm changes
      - Catalog source-resolution or deployment-script changes
      - Adding binary assets or snapshot-based image tests
    dependencies: []
    acceptance_criteria:
      - id: AC-1
        text: The canvas renderer adds local pure compression helpers and clamps effective core/halo radii into compact envelopes near 0.9-2.2 px for cores and 1.4-3.6 px for halos.
      - id: AC-2
        text: Halo rendering uses a radial gradient with center alpha and zero edge alpha, falls back deterministically to a solid halo if gradient creation fails, and skips halo drawing below the core-radius threshold.
      - id: AC-3
        text: Unit tests cover gradient creation, gradient color stops, compact radius envelopes, halo suppression, deterministic fallback, and unchanged B-V color semantics.
      - id: AC-4
        text: Runtime invariants continue to preserve likely-visible/daylight suppression, below-horizon rejection, optics limiting magnitude, and magnification-driven spacing behavior without changing magnificationX ownership.
      - id: AC-5
        text: Focused validation passes, no .bin artifacts are added, broader regression coverage is run if the focused suite is stable, and the implementation is delivered in a non-amended commit with code and tests.
    deliverables:
      - Updated deep-star canvas renderer with compact diameter-aware radial halo behavior
      - Updated unit/runtime tests for the visual contract and runtime invariants
      - Validation results and tuned envelope summary for delivery
      - Final non-amended commit containing the implementation and tests
    risks:
      - Canvas gradient mocks may need to capture addColorStop calls and fill-style usage without breaking existing overlay tests.
      - Aggressive radius compression could hide intended optics intensity changes if clamps are not tuned carefully.
      - Runtime assertions that infer size from captured radii may need narrow updates to reflect compact rendering without weakening behavior guarantees.
    rollback:
      - Revert scope-star-canvas renderer/test changes as one slice if compact rendering causes regressions.
      - Leave optics, catalog, and deployment paths untouched so rollback remains renderer-local.
