        text: Combined camera+motion recovery continues camera retry behavior and also surfaces the existing motion denial error message when orientation permission is denied.
      - id: AC-3
        text: Focused unit tests cover overlapping lock transitions and the combined recovery denial path, and the relevant test command passes.
