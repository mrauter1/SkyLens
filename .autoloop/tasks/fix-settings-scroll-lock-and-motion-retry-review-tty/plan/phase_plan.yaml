      - Update ViewerShell scroll-lock conditions to include settings-open state and own document/body lock lifecycle.
      - Remove conflicting SettingsSheet document/body scroll mutations while preserving sheet layout and focus behavior.
      - Restore motionRetryError handling for the combined camera+motion permission recovery path without regressing camera retry behavior.
